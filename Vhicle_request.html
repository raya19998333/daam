<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<title>Vehicle Request - Bootstrap Icons Style</title>

<!-- CSS Resources -->
<link rel="stylesheet" href="/Style Library/customscripts/scripts/bootstrap.min.css">
<link rel="stylesheet" href="/Style Library/customscripts/scripts/jquery-ui.css">
<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">

<!-- JS Resources -->
<script src="https://code.jquery.com"></script>
<script src="/Style Library/customscripts/scripts/jquery-ui.js"></script>

<!-- SharePoint Scripts (Logic Stay) -->
<script src="/Style%20Library/ContentEditor/Administration/Scripts/common.js"></script>
<script src="/Style%20Library/ContentEditor/Administration/Scripts/AttachDocs.js"></script>
<script src="/Style%20Library/ContentEditor/Administration/Scripts/CusValidation.js"></script>
<script src="/Style%20Library/ContentEditor/Administration/Scripts/Arabic.js"></script>

<style>
    /* ===== متغيرات الألوان الموحّدة - وضع فاتح ===== */
    :root {
        --primary:        #7D468C;
        --dark-purple:    #3D1A4F;
        --medium-purple:  #6F5573;
        --light-purple:   #A494A6;
        --accent:         #9B5AAB;
        --gold:           #B8860B;
        --soft-bg:        #F4EFF8;
        --card-bg:        #FFFFFF;
        --border:         rgba(125, 70, 140, 0.14);
        --text-main:      #2E1A3E;
        --text-muted:     #7A5E88;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        background-color: var(--soft-bg);
        font-family: 'Tajawal', 'Segoe UI', system-ui, sans-serif;
        padding: 60px 20px;
        min-height: 100vh;
        overflow-x: hidden;
    }

    /* ── خلفية فاتحة بدوائر ناعمة ── */
    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
            radial-gradient(ellipse 70% 55% at 15% 10%,  rgba(125,70,140,0.09) 0%, transparent 60%),
            radial-gradient(ellipse 55% 45% at 85% 85%,  rgba(212,168,67,0.07) 0%, transparent 55%),
            radial-gradient(ellipse 45% 40% at 55% 30%,  rgba(155,90,171,0.06) 0%, transparent 50%);
        pointer-events: none;
        z-index: 0;
    }

    /* ── نقاط زخرفية خفيفة ── */
    body::after {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
            radial-gradient(1.5px 1.5px at 12% 18%, rgba(125,70,140,.18) 0%, transparent 100%),
            radial-gradient(1.5px 1.5px at 42% 62%, rgba(184,134,11,.15)  0%, transparent 100%),
            radial-gradient(1.5px 1.5px at 73% 14%, rgba(125,70,140,.14) 0%, transparent 100%),
            radial-gradient(1.5px 1.5px at 88% 48%, rgba(184,134,11,.12)  0%, transparent 100%),
            radial-gradient(2px   2px   at 28% 82%, rgba(125,70,140,.16) 0%, transparent 100%),
            radial-gradient(1px   1px   at 58% 38%, rgba(155,90,171,.12) 0%, transparent 100%);
        pointer-events: none;
        z-index: 0;
        animation: twinkle 5s ease-in-out infinite alternate;
    }

    @keyframes twinkle {
        from { opacity: .5; }
        to   { opacity: 1;  }
    }

    /* ── الحاوية الرئيسية ── */
    #SPForm {
        max-width: 920px;
        margin: auto;
        position: relative;
        z-index: 1;
        animation: slideUp .7s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(40px); }
        to   { opacity: 1; transform: translateY(0);    }
    }

    /* ══════════════════════════════════════
       بطاقة زجاجية
    ══════════════════════════════════════ */
    .form-card {
        background:    var(--card-bg);
        border-radius: 28px;
        border:        1px solid var(--border);
        overflow:      hidden;
        position:      relative;
        box-shadow:
            0 0 0 1px rgba(125,70,140,.06),
            0 20px 60px rgba(125,70,140,.10),
            inset 0 1px 0 rgba(255,255,255,.80);
    }

    /* بريق متحرك على البطاقة */
    .form-card::after {
        content: '';
        position: absolute;
        top: 0; right: -100%;
        width: 60%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(125,70,140,.04), transparent);
        animation: shimmer 7s ease-in-out infinite;
        pointer-events: none;
        z-index: 0;
    }

    @keyframes shimmer {
        0%   { right: -100%; }
        50%  { right:  150%; }
        100% { right:  150%; }
    }

    /* ══════════════════════════════════════
       رأس النموذج — كلاسيك بنفسجي فاخر
    ══════════════════════════════════════ */
    .form-title-box {
        background: linear-gradient(145deg,
            #4A1A62 0%,
            #7D468C 45%,
            #5C2270 80%,
            #3D1A4F 100%);
        padding: 44px 50px 38px;
        position: relative;
        overflow: hidden;
        border-bottom: none;
        text-align: right;
    }

    /* دائرة زخرفية كبيرة — يسار */
    .form-title-box::before {
        content: '';
        position: absolute;
        top: -70px; left: -70px;
        width: 280px; height: 280px;
        border-radius: 50%;
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(255,255,255,0.04);
        pointer-events: none;
    }

    /* دائرة زخرفية صغيرة — يمين سفلي */
    .form-title-box::after {
        content: '';
        position: absolute;
        bottom: -90px; right: -60px;
        width: 320px; height: 320px;
        border-radius: 50%;
        border: 1px solid rgba(255,255,255,0.05);
        background: rgba(255,255,255,0.025);
        pointer-events: none;
    }

    /* خطوط قطرية ناعمة كخلفية نسيجية */
    .header-ornament {
        position: absolute;
        inset: 0;
        background-image: repeating-linear-gradient(
            -45deg,
            transparent 0px,
            transparent 28px,
            rgba(255,255,255,0.018) 28px,
            rgba(255,255,255,0.018) 29px
        );
        pointer-events: none;
        z-index: 0;
    }

    /* شريط ذهبي سفلي فاصل */
    .header-gold-line {
        position: absolute;
        bottom: 0; right: 0; left: 0;
        height: 3px;
        background: linear-gradient(to left,
            transparent 0%,
            rgba(212,168,67,0.5) 25%,
            rgba(212,168,67,0.9) 50%,
            rgba(212,168,67,0.5) 75%,
            transparent 100%);
        z-index: 2;
    }

    @keyframes pulse {
        0%,100% { transform: scale(1);   opacity: .5; }
        50%      { transform: scale(1.1); opacity: 1;  }
    }

    /* أيقونة عائمة — على خلفية داكنة تظهر بيضاء ناصعة */
    .header-icon-wrap {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 72px; height: 72px;
        border-radius: 20px;
        background: rgba(255,255,255,0.12);
        border: 1.5px solid rgba(255,255,255,0.22);
        box-shadow:
            0 8px 24px rgba(0,0,0,0.25),
            inset 0 1px 0 rgba(255,255,255,0.18);
        margin-bottom: 18px;
        animation: iconFloat 3.5s ease-in-out infinite;
        position: relative;
        z-index: 1;
        backdrop-filter: blur(4px);
    }

    .header-icon-wrap i {
        font-size: 2.1rem;
        color: #fff;
        filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3));
    }

    @keyframes iconFloat {
        0%,100% { transform: translateY(0);   }
        50%      { transform: translateY(-5px); }
    }

    .form-title-box h4 {
        color: #FFFFFF;
        font-weight: 900;
        font-size: 1.9rem;
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 8px;
        position: relative;
        z-index: 1;
        text-shadow: 0 2px 8px rgba(0,0,0,0.25);
        letter-spacing: -0.3px;
    }

    /* إخفاء أيقونة العنوان الإضافية (موجودة في الـ wrap) */
    .form-title-box h4 i { display: none; }

    .form-title-box p {
        color: rgba(255,255,255,0.70);
        font-size: .95rem;
        font-weight: 400;
        margin-top: 4px;
        position: relative;
        z-index: 1;
        letter-spacing: 0.2px;
    }

    /* شارة "النظام متاح" — ذهبية على الخلفية الداكنة */
    .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(212,168,67,0.15);
        border: 1px solid rgba(212,168,67,0.45);
        color: #E8C55A;
        font-size: .76rem;
        font-weight: 700;
        padding: 5px 16px;
        border-radius: 50px;
        margin-top: 16px;
        letter-spacing: .6px;
        position: relative;
        z-index: 1;
        backdrop-filter: blur(4px);
    }

    .status-dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: #E8C55A;
        animation: blink 1.5s ease-in-out infinite;
        box-shadow: 0 0 6px rgba(232,197,90,0.7);
    }

    @keyframes blink {
        0%,100% { opacity: 1;  }
        50%      { opacity: .3; }
    }

    /* ══════════════════════════════════════
       جسم النموذج
    ══════════════════════════════════════ */
    .form-body {
        padding: 38px 45px 30px;
        position: relative;
        z-index: 1;
    }

    /* فاصل الأقسام */
    .section-divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 26px;
        margin-top: 8px;
    }

    .section-divider span {
        color: var(--accent);
        font-size: .76rem;
        font-weight: 700;
        letter-spacing: 2px;
        white-space: nowrap;
    }

    .section-divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: linear-gradient(to left, transparent, var(--border));
    }

    /* ══════════════════════════════════════
       مجموعات الحقول
    ══════════════════════════════════════ */
    .field-group {
        margin-bottom: 24px;
    }

    .field-group label {
        color: var(--text-muted);
        font-weight: 600;
        font-size: .83rem;
        margin-bottom: 9px;
        display: flex;
        align-items: center;
        gap: 7px;
        letter-spacing: .3px;
    }

    /* شريط ملوّن قبل كل تسمية */
    .field-group label::before {
        content: '';
        display: inline-block;
        width: 3px; height: 14px;
        background: linear-gradient(to bottom, var(--primary), var(--accent));
        border-radius: 4px;
        flex-shrink: 0;
    }

    /* ══════════════════════════════════════
       حقول الإدخال مع الأيقونات
    ══════════════════════════════════════ */
    .input-with-icon {
        position: relative;
        display: flex;
        align-items: center;
    }

    .input-with-icon i {
        position: absolute;
        right: 15px;
        color: var(--text-muted);
        font-size: 1.15rem;
        transition: color .3s ease;
        pointer-events: none;
        z-index: 2;
    }

    .form-control {
        width: 100%;
        padding: 13px 46px 13px 15px !important;
        border: 1.5px solid rgba(125,70,140,.15);
        border-radius: 14px;
        background: #FAFAFA;
        color: var(--text-main) !important;
        font-family: 'Tajawal', sans-serif;
        font-size: .95rem;
        transition: all .3s cubic-bezier(.16,1,.3,1);
        position: relative;
        z-index: 1;
    }

    .form-control::placeholder {
        color: rgba(122,94,136,.45);
        font-size: .88rem;
    }

    .form-control:focus {
        background: #fff;
        border-color: var(--primary);
        box-shadow:
            0 0 0 4px rgba(125,70,140,.10),
            0 8px 25px rgba(125,70,140,.08);
        outline: none;
        color: var(--text-main) !important;
    }

    .input-with-icon:focus-within i {
        color: var(--primary);
    }

    textarea.form-control {
        min-height: 100px;
        padding-top: 15px !important;
        resize: vertical;
        line-height: 1.7;
    }

    select.form-control {
        cursor: pointer;
        appearance: none;
        -webkit-appearance: none;
    }

    select.form-control option {
        background: #fff;
        color: var(--text-main);
    }

    /* ══════════════════════════════════════
       إخفاء زوائد SharePoint
    ══════════════════════════════════════ */
    .ms-formtable, .ms-toolbar, .ui-dialog-titlebar-close, .hide { display: none !important; }

    .SpanValidation {
        color: #ff6b8a;
        font-size: 11px;
        margin-top: 4px;
        display: flex;
        align-items: center;
        gap: 5px;
    }

    /* ══════════════════════════════════════
       زر الإرسال
    ══════════════════════════════════════ */
    .custom-submit-btn {
        background: linear-gradient(135deg, var(--primary) 0%, #9B3DB8 50%, var(--dark-purple) 100%);
        color: white;
        border: none;
        padding: 14px 40px;
        border-radius: 50px;
        font-weight: 800;
        font-family: 'Tajawal', sans-serif;
        font-size: 1rem;
        transition: all .3s cubic-bezier(.16,1,.3,1);
        width: 100%;
        margin-top: 20px;
        cursor: pointer;
        letter-spacing: .5px;
        box-shadow:
            0 0 0 1px rgba(232,160,255,.10),
            0 10px 30px rgba(125,70,140,.30);
        position: relative;
        overflow: hidden;
    }

    .custom-submit-btn::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(255,255,255,.10), transparent);
        opacity: 0;
        transition: opacity .3s;
    }

    .custom-submit-btn:hover {
        transform: translateY(-2px);
        box-shadow:
            0 0 0 1px rgba(232,160,255,.22),
            0 20px 50px rgba(125,70,140,.45);
    }

    .custom-submit-btn:hover::before { opacity: 1; }

    /* ══════════════════════════════════════
       تذييل النموذج
    ══════════════════════════════════════ */
    .form-footer {
        padding: 18px 45px 26px;
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        position: relative;
        z-index: 1;
    }

    .form-footer span {
        color: var(--text-muted);
        font-size: .79rem;
    }

    .footer-dot {
        width: 4px; height: 4px;
        border-radius: 50%;
        background: var(--border);
    }

    /* ══════════════════════════════════════
       شبكة الأعمدة (Bootstrap-like)
    ══════════════════════════════════════ */
    .row {
        display: flex;
        flex-wrap: wrap;
        margin: 0 -10px;
    }

    [class*="col-"] { padding: 0 10px; }

    .col-md-4  { width: 33.333%; }
    .col-md-6  { width: 50%;     }
    .col-md-12 { width: 100%;    }

    @media (max-width: 768px) {
        .col-md-4,
        .col-md-6      { width: 100%; }
        .form-title-box,
        .form-body,
        .form-footer   { padding-left: 22px; padding-right: 22px; }
        .form-title-box h4 { font-size: 1.45rem; }
    }
</style>
</head>

<body>

<div id="SPForm">
    <div class="form-card">

        <!-- ═══ رأس النموذج ═══ -->
        <div class="form-title-box">
            <div class="header-ornament"></div>
            <div class="header-gold-line"></div>

            <div class="header-icon-wrap">
                <i class="bi bi-car-front-fill"></i>
            </div>

            <h4><i class="bi bi-car-front-fill"></i> طلب مركبة جديدة</h4>
            <p>يرجى إدخال تفاصيل المهمة لتخصيص المركبة المناسبة</p>

            <div class="status-badge">
                <span class="status-dot"></span>
                النظام متاح الآن
            </div>
        </div>

        <!-- ═══ جسم النموذج ═══ -->
        <div class="form-body">

            <!-- فاصل: بيانات التواصل والطلب -->
            <div class="section-divider">
                <span>بيانات التواصل والطلب</span>
            </div>

            <div class="row">

                <!-- Phone -->
                <div class="col-md-4 field-group">
                    <label>رقم التواصل</label>
                    <div class="input-with-icon">
                        <input type="text" class="form-control insert MobileNumber" id="MobileNumber" placeholder="رقم الهاتف" />
                        <i class="bi bi-telephone-fill"></i>
                    </div>
                </div>

                <!-- Vehicle Request Type -->
                <div class="col-md-4 field-group">
                    <label>نوع الطلب</label>
                    <div class="input-with-icon">
                        <select class="form-control VehicleRequest_s">
                            <option value="">اختر...</option>
                            <option value="24/7">خدمة 24/7</option>
                            <option value="Pool">تجمع (Pool)</option>
                            <option value="زيارة الموقع">زيارة الموقع</option>
                        </select>
                        <i class="bi bi-layers-half"></i>
                    </div>
                    <input type="hidden" class="insert VehicleRequest" id="VehicleRequest" />
                </div>

                <!-- Location -->
                <div class="col-md-4 field-group">
                    <label>الوجهة</label>
                    <div class="input-with-icon">
                        <select id="Location_s" class="form-control">
                            <option value="">حدد الموقع...</option>
                            <option value="Outside">خارج صلالة</option>
                            <option value="Inside">داخل صلالة</option>
                        </select>
                        <i class="bi bi-geo-alt-fill"></i>
                    </div>
                    <input type="hidden" class="insert Location" id="Location"/>
                </div>

            </div>

            <!-- فاصل: الجدول الزمني -->
            <div class="section-divider">
                <span>الجدول الزمني</span>
            </div>

            <div class="row">

                <!-- Start Date -->
                <div class="col-md-6 field-group">
                    <label>تاريخ البدء</label>
                    <div class="input-with-icon">
                        <input type="text" class="form-control insert From_Date" id="From_Date" placeholder="يوم/شهر/سنة" readonly />
                        <i class="bi bi-calendar-event"></i>
                    </div>
                </div>

                <!-- End Date -->
                <div class="col-md-6 field-group">
                    <label>تاريخ الانتهاء</label>
                    <div class="input-with-icon">
                        <input type="text" class="form-control insert To_Date" id="To_Date" placeholder="يوم/شهر/سنة" readonly />
                        <i class="bi bi-calendar-check-fill"></i>
                    </div>
                </div>

            </div>

            <!-- فاصل: تفاصيل المهمة -->
            <div class="section-divider">
                <span>تفاصيل المهمة</span>
            </div>

            <div class="row">

                <!-- Justification -->
                <div class="col-md-12 field-group">
                    <label>مبررات الطلب</label>
                    <div class="input-with-icon">
                        <textarea class="form-control insert Justification" id="Justification" placeholder="لماذا تحتاج المركبة؟"></textarea>
                        <i class="bi bi-chat-left-dots-fill" style="top: 15px;"></i>
                    </div>
                </div>

                <!-- Description -->
                <div class="col-md-12 field-group">
                    <label>الوصف الإضافي</label>
                    <div class="input-with-icon">
                        <textarea class="form-control insert Description" id="Description" placeholder="تفاصيل أخرى للمهمة..."></textarea>
                        <i class="bi bi-info-circle-fill" style="top: 15px;"></i>
                    </div>
                </div>

            </div>
        </div><!-- /form-body -->

        <!-- ═══ تذييل النموذج ═══ -->
     

    </div><!-- /form-card -->
</div><!-- /SPForm -->

<script>
$(document).ready(function(){
    // DatePicker Logic
    $("#From_Date, #To_Date").datepicker({
        dateFormat:'dd/mm/yy',
        minDate: 0
    });

    // Hidden Inputs Update
    $(".VehicleRequest_s").change(function(){
        $("#VehicleRequest").val($(this).val());
    });

    $("#Location_s").change(function(){
        $("#Location").val($(this).val());
    });
});
</script>

</body>
</html>
