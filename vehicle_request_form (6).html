/* ── SP-proof JS enforcement ─────────────────────────────
   Re-apply critical styles after SP finishes its own JS   */
function vrfEnforce() {
  // Force grid container
  var grid = document.querySelector('#vrf-root .form-grid');
  if (grid) {
    grid.style.cssText += ';display:grid!important;grid-template-columns:repeat(3,1fr)!important;gap:20px 24px!important;width:100%!important;float:none!important;';
  }
  // Force all inputs/selects full width
  document.querySelectorAll('#vrf-root .form-control').forEach(function(el) {
    el.style.cssText += ';width:100%!important;max-width:100%!important;box-sizing:border-box!important;float:none!important;';
  });
  // Force PID/Section hidden always
  ['PID','Section'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) {
      el.type = 'hidden';
      el.style.cssText = 'display:none!important;visibility:hidden!important;position:absolute!important;';
      // also hide parent label if any
      if (el.previousElementSibling && el.previousElementSibling.tagName === 'LABEL') {
        el.previousElementSibling.style.cssText = 'display:none!important;';
      }
    }
  });
  // Force hide class elements
  document.querySelectorAll('#vrf-root .hide').forEach(function(el) {
    el.style.cssText += ';display:none!important;visibility:hidden!important;height:0!important;overflow:hidden!important;';
  });
}
// Run immediately, after DOM ready, and after a delay to catch SP late renders
